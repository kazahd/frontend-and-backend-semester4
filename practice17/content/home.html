<div class="home-content">
    <h2 class="is-center">Добавить заметку</h2>
    <form id="note-form" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
        <input type="text" id="note-input" placeholder="Введите текст заметки" required style="flex: 3; min-width: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="flex: 1; min-width: 80px; padding: 10px 20px; background-color: #777; color: white; border: none; border-radius: 4px; cursor: pointer;">Добавить</button>
    </form>
    
    <h2 class="is-center">Добавить с напоминанием</h2>
    <form id="reminder-form" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="reminder-text" placeholder="Текст напоминания" required style="flex: 2; min-width: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <input type="datetime-local" id="reminder-time" required style="flex: 1; min-width: 180px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="flex: 1; min-width: 120px; padding: 10px 20px; background-color: #777; color: white; border: none; border-radius: 4px; cursor: pointer;">Добавить с напоминанием</button>
    </form>
        
    <h2 class="is-center">Список заметок</h2>
    <ul id="notes-list" style="list-style: none; padding-left: 0;"></ul>
</div>
